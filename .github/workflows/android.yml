name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Install Capacitor CLI
        run: bun add -d @capacitor/cli

      - name: Build web app
        run: bun run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            bun add @capacitor/core @capacitor/android @capacitor/app @anuradev/capacitor-background-mode
            npx cap add android
          fi

      - name: Inject background-audio permissions into AndroidManifest.xml
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Insert permissions right after the opening <manifest ...> tag if missing.
          for PERM in \
            "android.permission.FOREGROUND_SERVICE" \
            "android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" \
            "android.permission.WAKE_LOCK" \
            "android.permission.POST_NOTIFICATIONS" \
            "android.permission.MODIFY_AUDIO_SETTINGS"; do
            if ! grep -q "$PERM" "$MANIFEST"; then
              sed -i "0,/<application/{s|<application|    <uses-permission android:name=\"$PERM\" />\n    <application|}" "$MANIFEST"
            fi
          done
          cat "$MANIFEST"

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
